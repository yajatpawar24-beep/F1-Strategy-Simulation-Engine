<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>F1 Strategy Engine</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>🏎️ F1 Strategy Engine</h1>
            <p>Real-time race strategy predictions powered by ML</p>
        </header>

        <main>
            <div class="input-section">
                <h2>Race State Input</h2>
                <form id="predictionForm">
                    <div class="form-grid">
                        <!-- Lap Info -->
                        <div class="form-group">
                            <label>Lap Number</label>
                            <input type="number" id="LapNumber" value="20" min="1" required>
                        </div>
                        <div class="form-group">
                            <label>Stint</label>
                            <input type="number" id="Stint" value="2" min="1" required>
                        </div>
                        <div class="form-group">
                            <label>Tyre Life (laps)</label>
                            <input type="number" id="TyreLife" value="12" min="0" required>
                        </div>

                        <!-- Position -->
                        <div class="form-group">
                            <label>Position</label>
                            <input type="number" id="Position" value="5" min="1" max="20" required>
                        </div>
                        <div class="form-group">
                            <label>Grid Position</label>
                            <input type="number" id="GridPosition" value="7" min="1" max="20" required>
                        </div>

                        <!-- Tyre -->
                        <div class="form-group">
                            <label>Compound</label>
                            <select id="Compound" required>
                                <option value="SOFT">Soft</option>
                                <option value="MEDIUM" selected>Medium</option>
                                <option value="HARD">Hard</option>
                                <option value="INTERMEDIATE">Intermediate</option>
                                <option value="WET">Wet</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>Compound Code</label>
                            <input type="number" id="CompoundCode" value="2" min="0" max="4" required>
                        </div>
                        <div class="form-group">
                            <label>Fresh Tyre</label>
                            <select id="FreshTyre" required>
                                <option value="0" selected>No</option>
                                <option value="1">Yes</option>
                            </select>
                        </div>

                        <!-- Weather -->
                        <div class="form-group">
                            <label>Track Temp (°C)</label>
                            <input type="number" id="TrackTemp" value="45" step="0.1" required>
                        </div>
                        <div class="form-group">
                            <label>Air Temp (°C)</label>
                            <input type="number" id="AirTemp" value="28" step="0.1" required>
                        </div>
                        <div class="form-group">
                            <label>Wind Speed</label>
                            <input type="number" id="WindSpeed" value="2.5" step="0.1" required>
                        </div>
                        <div class="form-group">
                            <label>Rainfall</label>
                            <select id="Rainfall" required>
                                <option value="0" selected>No</option>
                                <option value="1">Yes</option>
                            </select>
                        </div>

                        <!-- Race Control -->
                        <div class="form-group">
                            <label>Safety Car</label>
                            <select id="IsSC" required>
                                <option value="0" selected>No</option>
                                <option value="1">Yes</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>DRS Available</label>
                            <select id="IsDRS" required>
                                <option value="0">No</option>
                                <option value="1" selected>Yes</option>
                            </select>
                        </div>

                        <!-- Identifiers -->
                        <div class="form-group">
                            <label>Team</label>
                            <input type="text" id="Team" value="Red Bull Racing" required>
                        </div>
                        <div class="form-group">
                            <label>Driver</label>
                            <input type="text" id="Driver" value="Max Verstappen" required>
                        </div>
                        <div class="form-group">
                            <label>Event Name</label>
                            <input type="text" id="EventName" value="Monaco Grand Prix" required>
                        </div>
                        <div class="form-group">
                            <label>Year</label>
                            <input type="number" id="Year" value="2024" min="2020" max="2030" required>
                        </div>
                    </div>

                    <button type="submit" class="btn-primary">🔮 Predict Strategy</button>
                </form>
            </div>

            <div class="output-section">
                <h2>Predictions</h2>
                <div id="loading" class="loading" style="display: none;">
                    <div class="spinner"></div>
                    <p>Running predictions...</p>
                </div>
                <div id="results" class="results" style="display: none;">
                    <div class="prediction-card">
                        <h3>⏱️ Lap Time</h3>
                        <p class="value" id="lapTime">--</p>
                    </div>
                    <div class="prediction-card">
                        <h3>🛞 Pit Probability</h3>
                        <p class="value" id="pitProb">--</p>
                        <div class="progress-bar">
                            <div id="pitProbBar" class="progress-fill"></div>
                        </div>
                    </div>
                    <div class="prediction-card">
                        <h3>⏳ Pit in 3 Laps</h3>
                        <p class="value" id="pitIn3">--</p>
                        <div class="progress-bar">
                            <div id="pitIn3Bar" class="progress-fill"></div>
                        </div>
                    </div>
                    <div class="prediction-card">
                        <h3>📊 Laps Until Pit</h3>
                        <p class="value" id="lapsUntil">--</p>
                    </div>
                    <div class="prediction-card full-width recommendation">
                        <h3>💡 Strategy Recommendation</h3>
                        <p id="recommendation">--</p>
                    </div>
                </div>
                <div id="error" class="error" style="display: none;"></div>
            </div>
        </main>

        <footer>
            <p>Built with LightGBM, CatBoost, Optuna, MLflow & FastAPI</p>
        </footer>
    </div>

    <script src="app.js"></script>
</body>
</html>
